<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login do Aluno</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00c9ff, #92fe9d);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #000;
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
      color: #181d38;
      font-size: 24px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      background-color: #fff;
      color: #000;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border: 1px solid #00c9ff;
    }

    .senha-container {
      position: relative;
      width: 100%;
      margin-bottom: 10px;
    }

    .senha-container input {
      padding-right: 45px;
      margin-bottom: 0;
    }

    .toggle-senha {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #555;
    }

    /* 🔥 NOVO LINK */
    .forgot {
      text-align: right;
      margin-bottom: 15px;
    }

    .forgot a {
      font-size: 13px;
      color: #000;
      text-decoration: underline;
      font-weight: 500;
    }

    .terms {
      font-size: 14px;
      margin-bottom: 15px;
      color: #000;
    }

    button {
      background: linear-gradient(135deg, #00c9ff, #92fe9d);
      color: #000;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #00a6cc, #72e489);
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h2>Login do Aluno</h2>

    {% if erro %}
      <div class="error">{{ erro }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="nome">Nome de Usuário</label>
      <input type="text" name="nome" id="nome" required>

      <label for="senha">Senha</label>

      <div class="senha-container">
        <input type="password" name="senha" id="senha" required>
        <i class="fa-solid fa-eye toggle-senha" onclick="toggleSenha()"></i>
      </div>

      <!-- 🔥 LINK ESQUECI A SENHA -->
      <div class="forgot">
        <a href="/recuperar-senha">Esqueci a senha</a>
      </div>

      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    function toggleSenha() {
      const input = document.getElementById("senha");
      const icon = document.querySelector(".toggle-senha");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>
</body>
</html>
