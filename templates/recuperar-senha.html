<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha do Aluno</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00c9ff, #92fe9d);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #000;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
      color: #181d38;
      font-size: 24px;
    }

    p {
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      color: #222;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      background-color: #fff;
      color: #000;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border: 1px solid #00c9ff;
    }

    button {
      background: linear-gradient(135deg, #00c9ff, #92fe9d);
      color: #000;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #00a6cc, #72e489);
    }

    .success {
      background-color: rgba(0, 200, 100, 0.8);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-size: 14px;
    }

    .error {
      background-color: rgba(255, 0, 0, 0.85);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-size: 14px;
    }

    .back {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .back a {
      color: #000;
      font-weight: bold;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Recuperar Senha do Aluno</h2>

    <p>Digite o seu email para receber o link de redefinição de senha.</p>

    {% if success %}
      <div class="success">Email enviado com sucesso!</div>
    {% endif %}

    {% if erro %}
      <div class="error">{{ erro }}</div>
    {% endif %}

    <form method="post" action="/recuperar-senha">
      <label for="email">Email do Aluno</label>
      <input type="email" name="email" id="email" placeholder="exemplo@gmail.com" required>

      <button type="submit">Enviar link</button>
    </form>

    <div class="back">
      <a href="/login">← Voltar ao login</a>
    </div>
  </div>

</body>
</html>
