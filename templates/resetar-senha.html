<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resetar Senha</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00c9ff, #92fe9d);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #181d38;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00c9ff, #92fe9d);
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: linear-gradient(135deg, #00a6cc, #72e489);
    }

    .error {
      background: red;
      color: #fff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      text-align: center;
    }

    .success {
      background: green;
      color: #fff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Nova Senha</h2>

    {% if erro %}
      <div class="error">{{ erro }}</div>
    {% endif %}

    {% if sucesso %}
      <div class="success">Senha alterada com sucesso!</div>
    {% endif %}

    <form method="post" action="/resetar-senha">
      <input type="hidden" name="token" value="{{ token }}">

      <input type="password" name="nova_senha" placeholder="Nova senha" required>

      <button type="submit">Atualizar Senha</button>
    </form>
  </div>

</body>
</html>
